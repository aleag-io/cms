name: CI

on:
  push:
    branches: [main, preview]
  pull_request:
    branches: [main, preview]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  # ─── 1. Static checks (fast, no DB needed) ────────────────────────────────
  static:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build API docs
        run: npm run api-docs:ci

      - name: Verify native Supabase branch bundle
        run: npm run db:branch:check

      - name: Upload API docs
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: public/api-docs/

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  # ─── 2. Unit + Integration + RLS tests (needs Postgres) ───────────────────
  test:
    name: Unit, Integration & RLS Tests
    runs-on: ubuntu-latest
    needs: static

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cms_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cms_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cms_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply Prisma schema migrations
        run: npx prisma migrate deploy

      - name: Apply CI auth shims (auth.jwt / auth.uid for plain Postgres)
        run: node scripts/apply-sql.js scripts/ci-auth-shims.sql

      - name: Apply Supabase SQL migrations (role, RLS, policies, Phase 2+3)
        run: node scripts/apply-sql.js supabase/migrations

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Run RLS cross-tenant tests (@phase:1 exit gate)
        run: npm run test:rls

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # ─── 3. E2E smoke (needs a running Next.js server) ────────────────────────
  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cms_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cms_e2e
      # Prefer IPv4 — wait-on + Next can disagree on localhost (::1 vs 127.0.0.1).
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      # Placeholder Auth env so the proxy does not hang on missing URL/key.
      # No Supabase stack in this job; authenticated e2e suites skip via helpers.
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:9
      NEXT_PUBLIC_SUPABASE_ANON_KEY: e2e-placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: e2e-placeholder-service-role-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply Prisma schema migrations
        run: npx prisma migrate deploy

      - name: Apply CI auth shims
        run: node scripts/apply-sql.js scripts/ci-auth-shims.sql

      - name: Apply Supabase SQL migrations (role, RLS, policies, Phase 2+3)
        run: node scripts/apply-sql.js supabase/migrations

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js app
        run: npm run build

      # Start + wait in one step so the process stays in the job's process group,
      # bind IPv4 explicitly, and surface logs if the server dies.
      - name: Start Next.js server and wait
        run: |
          set -euo pipefail
          npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/next-e2e.log 2>&1 &
          echo $! > /tmp/next-e2e.pid
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://127.0.0.1:3000/login; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            if ! kill -0 "$(cat /tmp/next-e2e.pid)" 2>/dev/null; then
              echo "Next.js process exited early. Log:"
              cat /tmp/next-e2e.log || true
              exit 1
            fi
            sleep 1
          done
          echo "Timed out waiting for server. Log:"
          cat /tmp/next-e2e.log || true
          exit 1

      - name: Run E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
