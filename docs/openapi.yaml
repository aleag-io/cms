openapi: 3.1.0
info:
  title: Mar Thoma Church CMS API
  version: 0.1.0
  summary: Tenant-scoped Church Management System API
  description: |
    This reference covers the implemented Next.js App Router API route handlers.
    Authenticated tenant-scoped handlers derive claims from Supabase/AppUser state
    and run user-facing data access through withTenant() so PostgreSQL RLS remains
    authoritative.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: /
    description: Current deployment
security:
  - BearerAuth: []
tags:
  - name: Session
    description: Authentication/session utilities and development bootstrap endpoints.
  - name: Registrations
    description: Public self-registration and parish approval workflows.
  - name: Jobs
    description: Secret-guarded background job endpoints.
  - name: Diocese
    description: Diocese administration endpoints.
  - name: Parish
    description: Parish catalog and administration endpoints.
  - name: Audit
    description: Append-only audit entry access.
  - name: Families
    description: Family profile management endpoints.
  - name: Members
    description: Member profile, directory, export, relationship, and parish membership endpoints.
  - name: Sensitive Member Data
    description: Clergy and pastoral data endpoints with stricter access controls.
  - name: Permissions
    description: Parish permission override endpoints.
  - name: Officers
    description: Parish officer assignment endpoints.
  - name: Programs
    description: Program and enrollment endpoints.
  - name: Organizations
    description: Organization and membership endpoints.
  - name: Events
    description: Event catalog and RSVP endpoints.
  - name: Facilities
    description: Facility and booking endpoints.
  - name: Communications
    description: Message queueing endpoints.
  - name: Data Sharing
    description: Data-sharing governance, contextual shares, and diocese aggregate endpoints.
paths:
  /api/session:
    get:
      tags: [Session]
      summary: Get current session
      operationId: getSession
      responses:
        '200':
          $ref: '#/components/responses/JsonSuccess'
        '401':
