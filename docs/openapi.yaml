components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Supabase JWT
    CronSecret:
      type: apiKey
      in: header
      name: x-cron-secret
  parameters:
    Id:
      name: id
      in: path
      required: true
      description: Resource identifier.
      schema:
        type: string
  requestBodies:
    JsonBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/JsonObject'
  responses:
    JsonSuccess:
      description: Successful JSON response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/JsonObject'
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    JsonObject:
      type: object
      additionalProperties: true
    ErrorResponse:
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: string
      additionalProperties: true
